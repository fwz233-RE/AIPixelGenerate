        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error(`读取文件失败: ${file.name || 'unknown'}`));
                reader.readAsDataURL(file);
            });
        }

        function loadImageFromUrl(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('图片加载失败'));
                img.src = url;
            });
        }

        async function normalizeVideoImage(file) {
            const sourceUrl = await fileToDataUrl(file);
            const img = await loadImageFromUrl(sourceUrl);

            const MIN_SIDE = 300;
            const MAX_SIDE = 2048;
            const MIN_RATIO = 0.4;
            const MAX_RATIO = 2.5;

            let drawWidth = img.width;
            let drawHeight = img.height;
            const minSide = Math.min(drawWidth, drawHeight);
            const maxSide = Math.max(drawWidth, drawHeight);

            if (minSide < MIN_SIDE) {
                const scale = MIN_SIDE / minSide;
                drawWidth = Math.round(drawWidth * scale);
                drawHeight = Math.round(drawHeight * scale);
            }

            if (Math.max(drawWidth, drawHeight) > MAX_SIDE) {
                const scale = MAX_SIDE / Math.max(drawWidth, drawHeight);
                drawWidth = Math.round(drawWidth * scale);
                drawHeight = Math.round(drawHeight * scale);
            }

            let canvasWidth = drawWidth;
            let canvasHeight = drawHeight;
            const ratio = drawWidth / drawHeight;

            if (ratio < MIN_RATIO) {
                canvasWidth = Math.round(drawHeight * MIN_RATIO);
            } else if (ratio > MAX_RATIO) {
                canvasHeight = Math.round(drawWidth / MAX_RATIO);
            }

            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const offsetX = Math.round((canvasWidth - drawWidth) / 2);
            const offsetY = Math.round((canvasHeight - drawHeight) / 2);
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

            return canvas.toDataURL('image/jpeg', 0.92);
        }

        function modelSupportsReferenceImages(model) {
            const value = (model || '').toLowerCase();
            return value.includes('seedance-2-0') || value.includes('seedance-1-0-lite-i2v');
        }

        function modelIsSeedance2(model) {
            return (model || '').toLowerCase().includes('seedance-2-0');
        }

        function validateVideoRequest(model, mode, resolution) {
            const value = (model || '').toLowerCase();

            if (mode === 'reference_images' && !modelSupportsReferenceImages(value)) {
                throw new Error('参考图生视频仅支持 seedance 2.0 / 2.0 fast 或 seedance 1.0 lite i2v 模型');
            }

            if (modelIsSeedance2(value) && resolution === '1080p') {
                throw new Error('seedance 2.0 / 2.0 fast 不支持 1080p，请切换到 480p 或 720p');
            }

            if ((mode === 'first_frame' || mode === 'first_last_frame' || mode === 'reference_images') && modelIsSeedance2(value)) {
                logVideo('当前模型属于 seedance 2.0 系列；若参考图含真人人脸，平台可能直接拦截。必要时改用 1.5 pro 或更换素材。', 'warn');
            }
        }

        function getVideoCreateErrorMessage(error) {
            const message = error?.message || String(error || '');
            if (message.toLowerCase().includes('input image may violate platform rules')) {
                return '接口拦截了参考图。已自动做尺寸和格式规范化；如果仍失败，优先检查 3 点：1）seedance 2.0 系列不支持直接上传含真人人脸的参考图；2）尝试改用 1.5 pro；3）更换非真人或更干净的素材。';
            }
            return message;
        }

        async function processVideoFiles(files) {
            const limit = getVideoImageLimit();
            if (limit === 0) {
                logVideo('当前模式不接受图片输入', 'warn');
                return;
            }

            const remaining = limit - videoReferenceImages.length;
            if (remaining <= 0) {
                logVideo(`当前模式最多允许 ${limit} 张图片`, 'warn');
                return;
            }

            const candidates = Array.from(files || []).filter(file => file && file.type && file.type.startsWith('image/'));
            if (candidates.length === 0) {
                logVideo('没有检测到可用图片文件', 'warn');
                return;
            }

            if (candidates.length > remaining) {
                logVideo(`超出上限，仅保留前 ${remaining} 张图片`, 'warn');
            }

            const accepted = candidates.slice(0, remaining);
            try {
                const results = await Promise.all(accepted.map(normalizeVideoImage));
                videoReferenceImages.push(...results);
                renderVideoPreviews();
                logVideo(`已添加 ${results.length} 张参考图片，并已自动规范为 JPEG`, 'success');
            } catch (error) {
                logVideo(error.message, 'error');
            }
        }

        function renderVideoPreviews() {
            const grid = document.getElementById('videoPreviewGrid');
            const placeholder = document.getElementById('videoUploadPlaceholder');
            const badge = document.getElementById('videoImgCountBadge');
            const limit = getVideoImageLimit();

            if (!grid) return;

            grid.innerHTML = '';
            badge.innerText = `${videoReferenceImages.length} / ${limit}`;
            placeholder.style.display = videoReferenceImages.length > 0 ? 'none' : 'block';

            videoReferenceImages.forEach((base64, index) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                div.onclick = (e) => e.stopPropagation();

                const img = document.createElement('img');
                img.src = base64;

                const role = document.createElement('div');
                role.className = 'thumb-role';
                role.textContent = getVideoRoleLabel(index);

                const btn = document.createElement('button');
                btn.className = 'thumb-remove';
                btn.innerHTML = 'x';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    videoReferenceImages.splice(index, 1);
                    renderVideoPreviews();
                    logVideo('已移除 1 张视频参考图', 'info');
                };

                div.appendChild(img);
                if (role.textContent) div.appendChild(role);
                div.appendChild(btn);
                grid.appendChild(div);
            });
        }

        function attachVideoDropZone() {
            const videoDropZone = document.getElementById('videoDropZone');
            if (!videoDropZone || videoDropZone.dataset.bound === 'true') return;
            videoDropZone.dataset.bound = 'true';

            videoDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                videoDropZone.classList.add('dragover');
            });
            videoDropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                videoDropZone.classList.remove('dragover');
            });
            videoDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                videoDropZone.classList.remove('dragover');
                if (e.dataTransfer.files) processVideoFiles(e.dataTransfer.files);
            });
        }

        function stopVideoPolling() {
            if (videoPollTimer) {
                clearTimeout(videoPollTimer);
                videoPollTimer = null;
            }
        }

        function scheduleVideoPolling(taskId, delay = 5000) {
            stopVideoPolling();
            videoPollTimer = setTimeout(() => queryVideoTask(taskId, true), delay);
        }

        function setVideoLoading(isLoading, placeholderText = '生成视频后会显示在这里') {
            document.getElementById('videoSpinner').style.display = isLoading ? 'block' : 'none';
            document.getElementById('videoPlaceholderText').style.display = isLoading ? 'block' : 'none';
            document.getElementById('videoPlaceholderText').textContent = placeholderText;
        }

        function updateVideoStatusBadge(status) {
            const badge = document.getElementById('videoTaskStatus');
            badge.textContent = status || 'idle';
            badge.className = 'status-badge';
            if (status === 'succeeded') badge.classList.add('success');
            else if (status === 'queued' || status === 'running') badge.classList.add('running');
            else if (status && status !== 'idle') badge.classList.add('error');
        }

        function formatUnixTime(value) {
            if (!value) return '--';
            return new Date(value * 1000).toLocaleString('zh-CN');
        }

        function updateVideoTaskPanel(task = {}) {
            updateVideoStatusBadge(task.status || 'idle');
            document.getElementById('videoTaskIdText').textContent = task.id || '--';
            document.getElementById('videoTaskModel').textContent = task.model || '--';
            document.getElementById('videoTaskUpdatedAt').textContent = formatUnixTime(task.updated_at);
            document.getElementById('videoTaskError').textContent = task.error?.message || '--';

            const urlLink = document.getElementById('videoTaskUrl');
            const urlPlaceholder = document.getElementById('videoTaskUrlPlaceholder');
            const videoUrl = task.content?.video_url || '';
            if (videoUrl) {
                urlLink.href = videoUrl;
                urlLink.style.display = 'inline';
                urlPlaceholder.style.display = 'none';
            } else {
                urlLink.href = '';
                urlLink.style.display = 'none';
                urlPlaceholder.style.display = 'inline';
                urlPlaceholder.textContent = '--';
            }
        }

        function resetVideoPreview() {
            const resultVideo = document.getElementById('resultVideo');
            const lastFrame = document.getElementById('videoLastFrame');
            resultVideo.pause();
            resultVideo.removeAttribute('src');
            resultVideo.load();
            resultVideo.style.display = 'none';
            lastFrame.removeAttribute('src');
            lastFrame.style.display = 'none';
            document.getElementById('videoUrlDisplay').style.display = 'none';
            document.getElementById('videoTaskUrl').style.display = 'none';
            document.getElementById('videoTaskUrlPlaceholder').style.display = 'inline';
            document.getElementById('videoTaskUrlPlaceholder').textContent = '--';
        }

        function showVideoResult(task) {
            const videoUrl = task.content?.video_url || '';
            const lastFrameUrl = task.content?.last_frame_url || '';
            const resultVideo = document.getElementById('resultVideo');
            const lastFrame = document.getElementById('videoLastFrame');

            if (videoUrl) {
                document.getElementById('videoUrlDisplay').style.display = 'block';
                document.getElementById('videoUrlLink').href = videoUrl;
                document.getElementById('videoUrlLink').textContent = videoUrl;
                resultVideo.src = videoUrl;
                resultVideo.style.display = 'block';
            }

            if (lastFrameUrl) {
                lastFrame.src = lastFrameUrl;
                lastFrame.style.display = 'block';
            }

            if (!videoUrl && !lastFrameUrl) {
                document.getElementById('videoPlaceholderText').style.display = 'block';
                document.getElementById('videoPlaceholderText').textContent = '任务完成，但响应中未返回视频地址';
            } else {
                document.getElementById('videoPlaceholderText').style.display = 'none';
            }
        }

        function buildVideoContent() {
            const mode = document.getElementById('videoMode').value;
            const prompt = document.getElementById('videoPrompt').value.trim();
            const content = [];

            if (prompt) content.push({ type: 'text', text: prompt });

            if (mode === 'text_only') {
                if (!prompt) throw new Error('文生视频必须填写提示词');
                return content;
            }

            if (mode === 'first_frame') {
                if (videoReferenceImages.length !== 1) throw new Error('首帧模式需要且只需要 1 张图片');
                content.push({ type: 'image_url', role: 'first_frame', image_url: { url: videoReferenceImages[0] } });
                return content;
            }

            if (mode === 'first_last_frame') {
                if (videoReferenceImages.length !== 2) throw new Error('首尾帧模式需要 2 张图片');
                content.push({ type: 'image_url', role: 'first_frame', image_url: { url: videoReferenceImages[0] } });
                content.push({ type: 'image_url', role: 'last_frame', image_url: { url: videoReferenceImages[1] } });
                return content;
            }

            if (mode === 'reference_images') {
                if (videoReferenceImages.length < 1) throw new Error('参考图模式至少需要 1 张图片');
                videoReferenceImages.forEach(url => {
                    content.push({ type: 'image_url', role: 'reference_image', image_url: { url } });
                });
                return content;
            }

            throw new Error('未知的视频生成模式');
        }

        async function generateVideo() {
            const apiKey = document.getElementById('videoApiKey').value.trim();
            const model = document.getElementById('videoModel').value.trim();
            const mode = document.getElementById('videoMode').value;
            const resolution = document.getElementById('videoResolution').value;
            const button = document.getElementById('generateVideoBtn');

            if (!apiKey) return logVideo('请先填写 ARK API Key', 'error');
            if (!model) return logVideo('请填写视频模型 ID', 'error');

            let content;
            try {
                validateVideoRequest(model, mode, resolution);
                content = buildVideoContent();
            } catch (error) {
                logVideo(error.message, 'error');
                return;
            }

            const payload = {
                model,
                content,
                resolution: document.getElementById('videoResolution').value,
                ratio: document.getElementById('videoRatio').value,
                duration: parseInt(document.getElementById('videoDuration').value, 10),
                seed: parseInt(document.getElementById('videoSeed').value, 10),
                generate_audio: document.getElementById('videoGenerateAudio').checked,
                return_last_frame: document.getElementById('videoReturnLastFrame').checked,
                watermark: document.getElementById('videoWatermark').checked
            };

            saveVideoConfig();
            button.disabled = true;
            button.innerText = '提交中...';
            resetVideoPreview();
            setVideoLoading(true, '视频任务已提交，等待响应...');
            updateVideoTaskPanel({ status: 'queued', model });

            try {
                const response = await fetch(VIDEO_API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || data.message || `HTTP ${response.status}`);
                if (!data.id) throw new Error('接口未返回任务 ID');

                currentVideoTaskId = data.id;
                currentVideoStatus = 'queued';
                document.getElementById('videoTaskId').value = data.id;
                saveVideoConfig();
                updateVideoTaskPanel({ id: data.id, status: 'queued', model });
                logVideo(`任务已创建: ${data.id}`, 'success');
                scheduleVideoPolling(data.id, 2000);
            } catch (error) {
                setVideoLoading(false, '生成视频后会显示在这里');
                const friendlyMessage = getVideoCreateErrorMessage(error);
                updateVideoTaskPanel({ status: 'failed', error: { message: friendlyMessage } });
                logVideo(`创建任务失败: ${friendlyMessage}`, 'error');
            } finally {
                button.disabled = false;
                button.innerText = '开始生成视频';
            }
        }

        async function queryVideoTaskByInput() {
            const taskId = document.getElementById('videoTaskId').value.trim();
            if (!taskId) return logVideo('请先输入任务 ID', 'warn');
            saveVideoConfig();
            await queryVideoTask(taskId, false);
        }

        async function queryVideoTask(taskId, silent = false) {
            const apiKey = document.getElementById('videoApiKey').value.trim();
            if (!apiKey) return logVideo('请先填写 ARK API Key', 'error');

            try {
                const response = await fetch(`${VIDEO_API_ENDPOINT}/${encodeURIComponent(taskId)}`, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || data.message || `HTTP ${response.status}`);

                currentVideoTaskId = data.id || taskId;
                document.getElementById('videoTaskId').value = currentVideoTaskId;
                saveVideoConfig();
                updateVideoTaskPanel(data);

                if (data.status !== currentVideoStatus || !silent) {
                    logVideo(`任务 ${currentVideoTaskId} 状态: ${data.status}`, data.status === 'failed' ? 'error' : 'info');
                }
                currentVideoStatus = data.status;

                if (data.status === 'queued' || data.status === 'running') {
                    setVideoLoading(true, `任务状态: ${data.status}，正在等待结果...`);
                    scheduleVideoPolling(currentVideoTaskId);
                    return;
                }

                stopVideoPolling();
                setVideoLoading(false);

                if (data.status === 'succeeded') {
                    showVideoResult(data);
                    logVideo('视频生成完成', 'success');
                } else {
                    logVideo(`任务结束: ${data.error?.message || data.status}`, 'error');
                }
            } catch (error) {
                if (!silent) {
                    logVideo(`查询任务失败: ${error.message}`, 'error');
                    setVideoLoading(false, '生成视频后会显示在这里');
                } else {
                    scheduleVideoPolling(taskId, 8000);
                }
            }
        }

        async function deleteVideoTask() {
            const apiKey = document.getElementById('videoApiKey').value.trim();
            const taskId = document.getElementById('videoTaskId').value.trim();

            if (!apiKey) return logVideo('请先填写 ARK API Key', 'error');
            if (!taskId) return logVideo('请先输入任务 ID', 'warn');
            if (!confirm(`确认删除或取消任务 ${taskId} 吗？`)) return;

            try {
                const response = await fetch(`${VIDEO_API_ENDPOINT}/${encodeURIComponent(taskId)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || `HTTP ${response.status}`);
                }

                stopVideoPolling();
                currentVideoStatus = 'idle';
                updateVideoTaskPanel({ status: 'idle' });
                resetVideoPreview();
                logVideo(`任务 ${taskId} 已执行删除或取消请求`, 'success');
            } catch (error) {
                logVideo(`删除任务失败: ${error.message}`, 'error');
            }
        }

        function log(msg, type = 'info') {
            if (typeof msg === 'string' && msg.indexOf('data:image') >= 0 && msg.indexOf('base64,') >= 0)
                msg = stripDataUrlsForLog(msg);
            const consoleEl = document.getElementById('logConsole');
            const color = type === 'error' ? '#e74c3c' : (type === 'success' ? '#2ecc71' : (type === 'warn' ? '#f39c12' : '#00ff00'));
            consoleEl.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;

            // 为 AOD 模式保存最新日志
            lastLogMessage = msg;
        }

        function pickImageGenSize(modelName) {
            const m = (modelName || '').toLowerCase();
            if (m.includes('gpt-image-2') || (m.includes('gpt-image') && m.includes('4k')))
                return '3840x2160';
            return '1024x1024';
        }

        /**
         * /v1/images/edits：OpenAI 文档中 size 为 1024x1024、1536x1024、1024x1536、auto；quality 为 high/medium/low/auto。
         * 最高像素常用 1536x1024 或 1024x1536（同档总像素）。部分中转对 size=auto 支持差，gpt-image-2/4K 用显式长边 1536 横版。
         */
        function pickImageEditSize(modelName) {
            const m = (modelName || '').toLowerCase();
            if (m.includes('dall-e-2')) return '1024x1024';
            if (m.includes('gpt-image-2') || (m.includes('gpt-image') && m.includes('4k'))) return '1536x1024';
            if (m.includes('gpt-image')) return '1024x1024';
            return '1024x1024';
        }

        function canUseImageEditsApi(modelName) {
            const m = (modelName || '').toLowerCase();
            return m.includes('gpt-image') || m.includes('dall-e-2');
        }

        /** gpt-image-2 固定高保真；1 / 1.5 可显式 input_fidelity high */
        function applyInputFidelityForImageEdits(modelName, payload) {
            const m = (modelName || '').toLowerCase();
            if (m.includes('gpt-image-2')) return;
            if (m.includes('gpt-image-1.5') || (m.includes('gpt-image-1') && !m.includes('mini')))
                payload.input_fidelity = 'high';
        }

        /** GPT 图模 Edits 可传 moderation: low，部分通道上弱于 auto，或减轻误拒（以接口为准）。 */
        function applyModerationForImageEdits(modelName, payload) {
            if ((modelName || '').toLowerCase().includes('gpt-image')) payload.moderation = 'low';
        }

        function dataUrlToBlob(dataUrl) {
            if (typeof dataUrl !== 'string' || !dataUrl.startsWith('data:')) throw new Error('参考图需为 data URL');
            const m = dataUrl.match(/^data:([^;,]+);base64,(.+)$/i);
            if (!m) throw new Error('参考图 base64 解析失败');
            const raw = m[2].replace(/\s/g, '');
            const binary = atob(raw);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new Blob([bytes], { type: m[1] || 'image/png' });
        }

        function dataUrlToFileName(dataUrl, index) {
            const m = typeof dataUrl === 'string' ? dataUrl.match(/^data:([^;]+);/) : null;
            const t = m ? m[1] : '';
            if (/jpe?g/i.test(t)) return 'ref' + index + '.jpg';
            if (/webp/i.test(t)) return 'ref' + index + '.webp';
            return 'ref' + index + '.png';
        }

        /**
         * 多数中转（含 New API）的 /v1/images/edits 只接受 multipart，与官档 curl 一致：image[] + 文本字段。
         */
        function buildImageEditsFormData(model, refPrompt, referenceDataUrls, editPayload) {
            const fd = new FormData();
            fd.append('model', model);
            fd.append('prompt', refPrompt);
            fd.append('n', String(editPayload.n != null ? editPayload.n : 1));
            fd.append('size', editPayload.size);
            if (editPayload.quality != null) fd.append('quality', String(editPayload.quality));
            if (editPayload.output_format) fd.append('output_format', editPayload.output_format);
            if (editPayload.input_fidelity) fd.append('input_fidelity', editPayload.input_fidelity);
            if (editPayload.moderation) fd.append('moderation', editPayload.moderation);
            referenceDataUrls.forEach((u, i) => {
                fd.append('image[]', dataUrlToBlob(u), dataUrlToFileName(u, i));
            });
            return fd;
        }

        /**
         * 固定为接口允许的最高档：GPT 图模 quality=high、output=png；DALL·E 3=hd；DALL·E 2=standard。
         */
        function applyImageGenerationsQualityAndFormat(modelName, payload) {
            const m = (modelName || '').toLowerCase();
            if (m.includes('gpt-image')) {
                payload.quality = 'high';
                payload.output_format = 'png';
                return;
            }
            if (m.includes('dall-e-3')) {
                payload.quality = 'hd';
                return;
            }
            if (m.includes('dall-e-2')) {
                payload.quality = 'standard';
            }
        }

        function resolveMaybeRelativeImageUrl(u, baseUrl) {
            if (typeof u !== 'string' || !u.trim()) return null;
            u = u.trim();
            if (u.startsWith('data:')) return u;
            if (u.startsWith('/') && !u.startsWith('//')) return baseUrl + u;
            return u;
        }

        /**
         * 解析结果为结构化描述，避免在中间环节拼接 data:image;base64, 超长字符串。
         * @returns {null|{kind:'remote',url:string}|{kind:'b64',base64:string,mime:string}}
         */
        function extractImageFromApiResponse(data, baseUrl) {
            if (!data || typeof data !== 'object') return null;
            const first = (arr) => (Array.isArray(arr) && arr.length && arr[0]) ? arr[0] : null;

            const urlStringToResult = (raw) => {
                if (typeof raw !== 'string' || !raw.trim()) return null;
                const u = raw.trim();
                const fromMd = extractInlineImageFromText(u);
                if (fromMd) return fromMd;
                const inline = parseDataUrlToB64Payload(u);
                if (inline) return { kind: 'b64', base64: inline.base64, mime: inline.mime };
                const resolved = resolveMaybeRelativeImageUrl(u, baseUrl);
                if (!resolved) return null;
                const inline2 = parseDataUrlToB64Payload(resolved);
                if (inline2) return { kind: 'b64', base64: inline2.base64, mime: inline2.mime };
                if (resolved.startsWith('data:')) return null;
                return { kind: 'remote', url: resolved };
            };

            const fromItem = (item) => {
                if (!item || typeof item !== 'object') return null;
                if (item.b64_json && typeof item.b64_json === 'string')
                    return { kind: 'b64', base64: normalizeBase64String(item.b64_json), mime: 'image/png' };
                if (item.url) {
                    const r = urlStringToResult(item.url);
                    if (r) return r;
                }
                if (item.image_url && item.image_url.url)
                    return urlStringToResult(String(item.image_url.url));
                return null;
            };

            let item = first(data.data);
            let got = fromItem(item);
            if (got) return got;

            if (data.data && typeof data.data === 'object' && !Array.isArray(data.data)) {
                got = fromItem(data.data);
                if (got) return got;
            }

            item = first(data.output);
            got = fromItem(item);
            if (got) return got;

            if (typeof data.url === 'string') {
                got = urlStringToResult(data.url);
                if (got) return got;
            }

            const msg = data.choices && data.choices[0] && data.choices[0].message;
            if (msg && msg.content != null) {
                if (typeof msg.content === 'string') {
                    const content = msg.content;
                    const inlineTxt = extractInlineImageFromText(content);
                    if (inlineTxt) return inlineTxt;
                    const mdMatch = content.match(/\!\[.*?\]\((https?:\/\/[^\s\)]+)\)/);
                    const urlMatch = content.match(/(https?:\/\/[^\s\)]+(?:\.png|\.jpg|\.jpeg|\.webp|\?[\w=&]+)?)/i);
                    if (mdMatch) return urlStringToResult(mdMatch[1]);
                    if (urlMatch) return urlStringToResult(urlMatch[1]);
                } else if (Array.isArray(msg.content)) {
                    for (let pi = 0; pi < msg.content.length; pi++) {
                        const part = msg.content[pi];
                        got = fromItem(part);
                        if (got) return got;
                        if (part && part.image_url && part.image_url.url)
                            got = urlStringToResult(String(part.image_url.url));
                        if (got) return got;
                        const texts = [];
                        if (part && typeof part.text === 'string') texts.push(part.text);
                        if (part && typeof part.content === 'string') texts.push(part.content);
                        for (let ti = 0; ti < texts.length; ti++) {
                            got = extractInlineImageFromText(texts[ti]);
                            if (got) return got;
                            got = urlStringToResult(texts[ti]);
                            if (got) return got;
                        }
                    }
                }
            }
            if (data.choices && data.choices[0]) {
                got = deepExtractInlineImage(data.choices[0], 0);
                if (got) return got;
            }
            return null;
        }

        function sanitizeForLog(str, maxLen) {
            if (typeof str !== 'string') return str;
            let s = stripDataUrlsForLog(str);
            s = s.replace(/("b64_json"\s*:\s*")([A-Za-z0-9+/=]{120,})(")/gi, '$1[已省略]$3');
            if (s.length > maxLen) s = s.slice(0, maxLen) + '…';
            return s;
        }

        function safeStringifyApiError(data, cap) {
            try {
                const json = JSON.stringify(data, function replacer(key, val) {
                    if (typeof val === 'string') {
                        if (val.length > 400 && /^[A-Za-z0-9+/=\r\n]+$/.test(val.replace(/\s/g, '')))
                            return '[base64/长文本已省略，长度 ' + val.length + ']';
                        if (val.startsWith('data:image') && val.includes('base64,'))
                            return '[data URL 已省略，长度 ' + val.length + ']';
                    }
                    return val;
                });
                return json.length > cap ? json.slice(0, cap) + '…' : json;
            } catch (e) {
                return sanitizeForLog(String(data), cap);
            }
        }

        async function generateImage() {

                        const contentArray = [
                            { type: "text", text: prompt + " \n\n(Generate a high-quality, sharp, full-detail image from the reference image(s) and this description. If you return a link, it must be the full image URL only.)" }
                        ];

                        const chatPayload = {

                } else {

                    }
                    fetchInit.body = JSON.stringify(genPayload);
                    fetchInit.headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` };
                }

                log(`发送 POST 请求...`);

                requestStartTime = Date.now();

                // 显示 AOD 按钮
                document.getElementById('aodBtn').style.display = 'inline-block';

                const response = await fetch(url, fetchInit);

                const rawText = await response.text();

                } catch (parseErr) {
                    log(`API 返回非 JSON（HTTP ${response.status}），前 800 字符：${sanitizeForLog(rawText.slice(0, 800), 800)}`, 'error');
                    throw new Error('无法解析 API 响应为 JSON，请确认 Base URL 指向正确的兼容接口');
                }

                if (!response.ok) {
                    log('API 返回错误信息: ' + safeStringifyApiError(data, 4000), 'error');
                    const errMsg = data.error?.message != null ? String(data.error.message) : '';
                    if (errMsg.includes('没有可用token')) {
                        log('说明：这表示该 Key 在「当前通道/账户」下没有可用额度或配额（不是 sk 写错，而是余额、套餐或生图用量已用尽）。请登录 API 管理后台查余额/充值/套餐，或确认该模型在账户内是否可计费。', 'warn');
                    }
                    if (errMsg.includes('没有按照预期生成图片') || errMsg.includes('重新调整提示词')) {

                    }
                    throw new Error(data.error?.message || `HTTP ${response.status}`);
                }

                const extracted = extractImageFromApiResponse(data, baseUrl);
                if (data.choices && data.choices[0]?.message?.content && !extracted) {
                    const content = data.choices[0].message.content;
                    log('收到 Chat 风格响应，尝试解析图片...', 'info');
                    if (typeof content === 'string') {
                        log('❌ 未检测到可用图片数据，模型原文（已脱敏）:', 'error');
                        log(sanitizeForLog(content, 3000), 'warn');
                        phText.innerText = '模型未返回可识别的图片链接，请见日志';

                    } else if (Array.isArray(content)) {
                        const types = content.map(function (p) { return (p && p.type) ? p.type : '?'; }).join(', ');
                        log('❌ 未解析到图片；message.content 为数组，各段 type: ' + types, 'warn');
                    }
                }

                if (!extracted && !(data && data._type === 'newapi_channel_conn')) {
                    const top = data && typeof data === 'object' ? Object.keys(data).join(', ') : '(无)';
                    log(`未从响应中解析出图片 URL/base64，顶层字段: ${top}`, 'warn');
                    if (data && Array.isArray(data.data) && data.data[0] && typeof data.data[0] === 'object')
                        log(`data[0] 字段: ${Object.keys(data.data[0]).join(', ')}`, 'warn');
                    else if (data && data.data && typeof data.data === 'object' && !Array.isArray(data.data))
                        log(`data 对象字段: ${Object.keys(data.data).join(', ')}`, 'warn');
                }

                // New API 在配置异常或误访问时会返回 _type: newapi_channel_conn，并非生图结果
                if (data && data._type === 'newapi_channel_conn') {
                    log("❌ 收到通道连接信息 (newapi_channel_conn)，不是生图成功响应。", 'error');
                    log("说明：在浏览器里直接打开 Base URL 根地址可能只看到这类 JSON，请使用本页「开始生成」向 /v1/images/generations 发 POST。若点生成后仍出现，请到 API 控制台检查该 Key 是否已绑定通道、模型 gpt-image-2-4K 是否已启用/有余额。", 'warn');
                    phText.innerText = "未得到图片，返回为通道元数据，请见上方日志";
                    phText.style.display = 'block';
                    spinner.style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = "🚀 开始生成图片";
                    const aodV = document.getElementById('aodBlackVideo');
                    if (aodV && aodV.style.display !== 'none') exitAODMode();
                    return;
                }

                if (extracted) {
                    let imgSrc = null;
                    let linkHref = null;
                    let linkLabel = '';

                    if (extracted.kind === 'remote') {
                        imgSrc = extracted.url;
                        linkHref = extracted.url;
                        linkLabel = truncateUrlForLabel(extracted.url, 120);

                    } else {

                            imgSrc = createResultImageObjectUrlFromBase64(extracted.base64, extracted.mime);
                            linkHref = imgSrc;
                            linkLabel = '本地预览（Object URL · 可右键图片另存）';
                            const approxKb = Math.round(extracted.base64.length * 0.75 / 1024);

                    log('获取生成结果，正在加载预览…');

                    // --- 强制关闭循环视频 ---
                    const aodVideo = document.getElementById('aodBlackVideo');
                    if (aodVideo && aodVideo.style.display !== 'none') {
                        exitAODMode();

                    // -----------------------

                    displayImageUrl(linkHref, linkLabel);
                    resultImg.src = imgSrc;
                    resultImg.onload = () => {

                        loopBtn.style.display = 'inline-block';

                        // ---------------------------------------------------
                    };
                    resultImg.onerror = () => {
                        log('❌ 图片在页面内加载失败（防盗链、跨域或链接仅短时有效）', 'error');
                        spinner.style.display = 'none';
                        btn.disabled = false;
                        btn.innerText = "🚀 开始生成图片";
                        phText.style.display = 'block';

                    };
                } else {
                    spinner.style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = "🚀 开始生成图片";
                    phText.style.display = 'block';
                    if (!phText.innerText || phText.innerText === '图片将显示在这里')
                        phText.innerText = '未解析到图片数据，请根据下方日志检查接口返回格式';
                }

            } catch (error) {
                log(`❌ 执行出错: ${error.message}`, 'error');
                spinner.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "🚀 开始生成图片";
                phText.style.display = 'block';
                phText.innerText = "请求出错，请检查日志";

        }

        // --- 4. AOD Mode Implementation (Video Only) ---
        let wakeLock = null;
        let requestStartTime = null; // 请求开始时间，用于计时

        // Request Wake Lock
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    // 不输出日志，改为静默激活
                    wakeLock.addEventListener('release', () => {
                        // 静默释放
                    });
                } catch (err) {
                    // 静默处理错误
                }
            }
        }

        // Release Wake Lock
        async function releaseWakeLock() {
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
            }
        }

        // Canvas-based AOD Animation
        let canvas = null;
        let ctx = null;
        let canvasWidth = 0;
        let canvasHeight = 0;

        // Toggle AOD Mode with Video Fullscreen
        async function toggleAODMode() {
            const video = document.getElementById('aodBlackVideo');

            // 显示视频元素并重置所有样式（移除所有隐藏状态）
            video.style.display = 'block';
            video.style.opacity = '1';
            video.style.visibility = 'visible';
            video.style.zIndex = '9999';
            video.style.pointerEvents = 'auto'; // 恢复指针事件
            video.style.transform = 'scale(1)'; // 恢复缩放

            // 播放视频
            try {
                await video.play();
            } catch (e) { }

            // 请求视频全屏（iOS优先使用webkitEnterFullscreen）
            try {
                if (video.webkitEnterFullscreen) {
                    // iOS Safari - 使用原生全屏播放器
                    video.webkitEnterFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    await video.webkitRequestFullscreen();
                } else if (video.requestFullscreen) {
                    await video.requestFullscreen();
                }
            } catch (e) { }

            // Request wake lock
            await requestWakeLock();
        }


        // Exit AOD Mode - iOS Deep Fix: 彻底移除黑色覆盖层
        function exitAODMode(fromEvent = false) {
            const video = document.getElementById('aodBlackVideo');

            // 防止重复调用
            if (video.style.display === 'none') return;

            // 立即完全隐藏视频元素和所有交互
            video.style.display = 'none';
            video.style.opacity = '0';
            video.style.visibility = 'hidden';
            video.style.zIndex = '-9999';
            video.style.pointerEvents = 'none'; // 禁用所有指针事件
            video.style.transform = 'scale(0)'; // 缩放为0

            // 暂停视频
            video.pause();
            video.currentTime = 0;

            // 退出全屏 - iOS需要特殊处理
            try {
                if (video.webkitExitFullscreen) {
                    // iOS优先使用这个方法
                    video.webkitExitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => { });
                }
            } catch (e) { }

            // Release wake lock
            releaseWakeLock();

            // 强制多次重绘，确保iOS完全移除覆盖层
            requestAnimationFrame(() => {
                video.offsetHeight;
                document.body.offsetHeight;
                requestAnimationFrame(() => {
                    video.offsetHeight;
                });
            });
        }


        // Handle visibility change to reacquire wake lock
        document.addEventListener('visibilitychange', async () => {
            const aodVideo = document.getElementById('aodBlackVideo');
            if (document.visibilityState === 'visible' && aodVideo && aodVideo.style.display !== 'none') {
                await requestWakeLock();
            }
        });

        // Handle fullscreen change - 当全屏退出时立即隐藏黑色层
        document.addEventListener('fullscreenchange', () => {
            const aodVideo = document.getElementById('aodBlackVideo');
            if (!document.fullscreenElement && aodVideo && aodVideo.style.display !== 'none') {
                exitAODMode(true);
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            const aodVideo = document.getElementById('aodBlackVideo');
            if (!document.webkitFullscreenElement && aodVideo && aodVideo.style.display !== 'none') {
                exitAODMode(true);
            }
        });

        // iOS专用：监听原生视频播放器退出事件（这是核心！）
        document.getElementById('aodBlackVideo').addEventListener('webkitendfullscreen', () => {
            // iOS原生播放器完全退出后立即隐藏黑色层
            exitAODMode(true);
        });

        // iOS专用：视频点击事件处理
        document.getElementById('aodBlackVideo').addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            exitAODMode();
        });

        // --- Prompt Manager Functions ---
        let promptHistory = [];

        // Load prompt history from localStorage
        function loadPromptHistory() {
            const saved = localStorage.getItem(CONFIG_KEYS.PROMPT_HISTORY);
            if (saved) {
                try {
                    promptHistory = JSON.parse(saved);
                } catch (e) {
                    promptHistory = [];
                }
            }
        }

        // Save prompt history to localStorage
        function savePromptHistory() {
            localStorage.setItem(CONFIG_KEYS.PROMPT_HISTORY, JSON.stringify(promptHistory));
        }

        // 已移除自动记录功能，改为完全手动管理

        // Open prompt manager modal
        function openPromptManager() {
            loadPromptHistory();
            renderPromptList();
            document.getElementById('promptModal').classList.add('active');
        }

        // Close prompt manager modal
        function closePromptManager() {
            document.getElementById('promptModal').classList.remove('active');
        }

        // Render prompt list
        function renderPromptList() {
            const listContainer = document.getElementById('promptList');
            const currentPrompt = document.getElementById('prompt').value;

            if (promptHistory.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-prompt-state">
                        <p>📝 暂无 Prompt 记录</p>
                        <p style="font-size: 14px; color: #aaa;">点击下方「➕ 添加新 Prompt」按钮手动添加</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = promptHistory.map((item, index) => {
                const isCurrent = item.text === currentPrompt;
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="prompt-item ${isCurrent ? 'current' : ''}" onclick="selectPrompt(${item.id})">
                        <div class="prompt-text" style="white-space: pre-wrap;">${escapeHtml(item.text)}</div>
                        <div class="prompt-meta">
                            <span>🕒 ${timeStr}</span>
                            <div class="prompt-actions" onclick="event.stopPropagation();">
                                <button class="prompt-action-btn edit" onclick="editPrompt(${item.id})">✏️ 编辑</button>
                                <button class="prompt-action-btn delete" onclick="deletePrompt(${item.id})">🗑️ 删除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Select and apply prompt
        function selectPrompt(id) {
            const prompt = promptHistory.find(p => p.id === id);
            if (prompt) {
                document.getElementById('prompt').value = prompt.text;
                saveConfig();
                log(`已应用 Prompt: ${prompt.text.substring(0, 50)}...`, 'success');
                closePromptManager();
            }
        }

        // Edit prompt
        function editPrompt(id) {
            const prompt = promptHistory.find(p => p.id === id);
            if (!prompt) return;

            const newText = window.prompt('编辑 Prompt:', prompt.text);
            if (newText !== null && newText.trim() !== '') {
                prompt.text = newText.trim();
                prompt.timestamp = Date.now();
                savePromptHistory();
                renderPromptList();
                log('Prompt 已更新', 'success');
            }
        }

        // Delete prompt
        function deletePrompt(id) {
            if (!confirm('确定要删除这个 Prompt 吗?')) return;

            const index = promptHistory.findIndex(p => p.id === id);
            if (index !== -1) {
                promptHistory.splice(index, 1);
                savePromptHistory();
                renderPromptList();
                log('Prompt 已删除', 'warn');
            }
        }

        // Add new prompt manually
        function addNewPrompt() {
            const currentPromptText = document.getElementById('prompt').value.trim();
            const text = window.prompt('输入新的 Prompt:', currentPromptText);

            if (text && text.trim() !== '') {
                const trimmedText = text.trim();

                // Check if prompt already exists
                const existingIndex = promptHistory.findIndex(p => p.text === trimmedText);
                if (existingIndex !== -1) {
                    alert('该 Prompt 已存在！');
                    return;
                }

                promptHistory.unshift({
                    id: Date.now(),
                    text: trimmedText,
                    timestamp: Date.now()
                });

                // Keep only last 10
                if (promptHistory.length > 10) {
                    promptHistory = promptHistory.slice(0, 10);
                }

                savePromptHistory();
                renderPromptList();
                log('新 Prompt 已添加', 'success');
            }
        }

        // Load prompt history on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadPromptHistory();
        });
    </script>

</body>

</html>

                    promptHistory = JSON.parse(saved);
                } catch (e) {
                    promptHistory = [];
                }
            }
        }

        // Save prompt history to localStorage
        function savePromptHistory() {
            localStorage.setItem(CONFIG_KEYS.PROMPT_HISTORY, JSON.stringify(promptHistory));
        }

        // 已移除自动记录功能，改为完全手动管理

        // Open prompt manager modal
        function openPromptManager() {
            loadPromptHistory();
            renderPromptList();
            document.getElementById('promptModal').classList.add('active');
        }

        // Close prompt manager modal
        function closePromptManager() {
            document.getElementById('promptModal').classList.remove('active');
        }

        // Render prompt list
        function renderPromptList() {
            const listContainer = document.getElementById('promptList');
            const currentPrompt = document.getElementById('prompt').value;

            if (promptHistory.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-prompt-state">
                        <p>📝 暂无 Prompt 记录</p>
                        <p style="font-size: 14px; color: #aaa;">点击下方「➕ 添加新 Prompt」按钮手动添加</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = promptHistory.map((item, index) => {
                const isCurrent = item.text === currentPrompt;
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="prompt-item ${isCurrent ? 'current' : ''}" onclick="selectPrompt(${item.id})">
                        <div class="prompt-text" style="white-space: pre-wrap;">${escapeHtml(item.text)}</div>
                        <div class="prompt-meta">
                            <span>🕒 ${timeStr}</span>
                            <div class="prompt-actions" onclick="event.stopPropagation();">
                                <button class="prompt-action-btn edit" onclick="editPrompt(${item.id})">✏️ 编辑</button>
                                <button class="prompt-action-btn delete" onclick="deletePrompt(${item.id})">🗑️ 删除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Select and apply prompt
        function selectPrompt(id) {
            const prompt = promptHistory.find(p => p.id === id);
            if (prompt) {
                document.getElementById('prompt').value = prompt.text;
                saveConfig();
                log(`已应用 Prompt: ${prompt.text.substring(0, 50)}...`, 'success');
                closePromptManager();
            }
        }

        // Edit prompt
        function editPrompt(id) {
            const prompt = promptHistory.find(p => p.id === id);
            if (!prompt) return;

            const newText = window.prompt('编辑 Prompt:', prompt.text);
            if (newText !== null && newText.trim() !== '') {
                prompt.text = newText.trim();
                prompt.timestamp = Date.now();
                savePromptHistory();
                renderPromptList();
                log('Prompt 已更新', 'success');
            }
        }

        // Delete prompt
        function deletePrompt(id) {
            if (!confirm('确定要删除这个 Prompt 吗?')) return;

            const index = promptHistory.findIndex(p => p.id === id);
            if (index !== -1) {
                promptHistory.splice(index, 1);
                savePromptHistory();
                renderPromptList();
                log('Prompt 已删除', 'warn');
            }
        }

        // Add new prompt manually
        function addNewPrompt() {
            const currentPromptText = document.getElementById('prompt').value.trim();
            const text = window.prompt('输入新的 Prompt:', currentPromptText);

            if (text && text.trim() !== '') {
                const trimmedText = text.trim();

                // Check if prompt already exists
                const existingIndex = promptHistory.findIndex(p => p.text === trimmedText);
                if (existingIndex !== -1) {
                    alert('该 Prompt 已存在！');
                    return;
                }

                promptHistory.unshift({
                    id: Date.now(),
                    text: trimmedText,
                    timestamp: Date.now()
                });

                // Keep only last 10
                if (promptHistory.length > 10) {
                    promptHistory = promptHistory.slice(0, 10);
                }

                savePromptHistory();
                renderPromptList();
                log('新 Prompt 已添加', 'success');
            }
        }

        // Load prompt history on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadPromptHistory();
        });
    </script>

</body>

</html>
